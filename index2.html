<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boostrap dashboard</title>

    <!-- link Boostrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <!-- header navbar -->
    <header>
        <nav class="navbar navbar-expand-lg bg-dark"> <!-- data-bs-theme="dark" -->
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="./img/duck.png" alt="logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" aria-current="page" href="#">Catologo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" role="button">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" role="button">Help</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search" />
                        <button class="btn" type="submit">Cerca</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container my-3">
            <div class="row">
                <h1>
                    Nuovo libro
                </h1>
            </div>
            <form class="row g-3">
                <div class="col-6 author-name">
                    <label class="form-label">Nome Autore</label>
                    <input required type="text" class="form-control" placeholder="Inserisci il nome dell'autore">
                </div>
                <div class="col-6 authore-surname">
                    <label class="form-label">Cognome Autore</label>
                    <input required type="text" class="form-control" placeholder="Inserisci il cognome">
                </div>
                <div class="col-12 title">
                    <label class="form-label">Titolo</label>
                    <input required type="text" class="form-control" placeholder="Inserisci il titolo del libro">
                    <div class="form-text">Titolo versione italiana</div>
                </div>
                <div class="col-12 col-md-4 type">
                    <label for="inputState" class="form-label">State</label>
                    <select required id="inputState" class="form-select">
                        <option selected>Scegli il genere</option>
                        <option>avventura</option>
                        <option>azione</option>
                        <option>giallo</option>
                        <option>questo è un Easter egg per i tutor ;) </option>
                    </select>
                </div>
                <div class="col-12 col-md-4 publication">
                    <label class="form-label">Anno di pubblicazione</label>
                    <input required type="text" class="form-control" placeholder="Inserisci l'anno">
                </div>
                <div class="col-md-4 mb-4 ISBN">
                    <label for="inputAddress2" class="form-label">ISBN#</label>
                    <input required type="text" class="form-control" id="inputAddress2" placeholder="Inserisci il codice ISBN#">
                </div>
                <!-- separatore -->
                <hr>
                <div class="mb-3 note">
                    <label for="exampleFormControlTextarea1" class="form-label">Note</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                        placeholder="Inserisci eventuali note sul libro"></textarea>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck">
                        <label class="form-check-label" for="gridCheck">
                            Disponibile anche in digitale
                        </label>
                    </div>
                </div>
                <div class="col-12 mb-5">
                    <button type="submit" class="btn btn-primary">Aggiungi libro</button>
                </div>
            </form>
        </div>
    </main>
